spring.application.name=api-gateway

# ---- Server ----
server.port=8080

# ---- JWT ----
jwt.secret=${JWT_SECRET:dev-only-secret-do-not-use-in-production-0123456789}

# ---- Routes: the gateway's forwarding table ----
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=menu-service
spring.cloud.gateway.routes[1].uri=${MENU_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/menu/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=${ORDER_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=${PAYMENT_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info