spring.application.name=notification-service

# ---- Server ----
server.port=8085

# ---- Kafka ----
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.lakshmiskitchen.notificationservice.event.OrderPlacedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# ---- Email (Brevo SMTP) ----
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN:}
spring.mail.password=${BREVO_SMTP_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- App settings ----
notification.email.enabled=${EMAIL_ENABLED:false}
notification.email.from=${EMAIL_FROM:}

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info