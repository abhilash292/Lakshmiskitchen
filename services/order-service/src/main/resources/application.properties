spring.application.name=order-service

# ---- Server ----
server.port=8083

# ---- Database connection (pg-orders container) ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/ordersdb}
spring.datasource.username=lakshmiskitchen
spring.datasource.password=devpassword

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ---- Other services ----
menu.service.url=${MENU_SERVICE_URL:http://localhost:8082}

# ---- Kafka ----
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,beans,prometheus