services:

  postgres-users:
    image: postgres:16
    environment:
      POSTGRES_USER: lakshmiskitchen
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: usersdb
    volumes:
      - users-data:/var/lib/postgresql/data

  postgres-menu:
    image: postgres:16
    environment:
      POSTGRES_USER: lakshmiskitchen
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: menudb
    volumes:
      - menu-data:/var/lib/postgresql/data

  postgres-orders:
    image: postgres:16
    environment:
      POSTGRES_USER: lakshmiskitchen
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: ordersdb
    volumes:
      - orders-data:/var/lib/postgresql/data

  postgres-payments:
    image: postgres:16
    environment:
      POSTGRES_USER: lakshmiskitchen
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: paymentsdb
    volumes:
      - payments-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka-data:/var/lib/kafka/data

  user-service:
    build: ./services/user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-users:5432/usersdb
    depends_on:
      - postgres-users

  menu-service:
    build: ./services/menu-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-menu:5432/menudb
    depends_on:
      - postgres-menu

  order-service:
    build: ./services/order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-orders:5432/ordersdb
      MENU_SERVICE_URL: http://menu-service:8082
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres-orders
      - menu-service
      - kafka

  payment-service:
    build: ./services/payment-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payments:5432/paymentsdb
      ORDER_SERVICE_URL: http://order-service:8083
    depends_on:
      - postgres-payments
      - order-service

  notification-service:
    build: ./services/notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BREVO_SMTP_LOGIN: ${BREVO_SMTP_LOGIN}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY}
      EMAIL_ENABLED: ${EMAIL_ENABLED}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      - kafka

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      MENU_SERVICE_URL: http://menu-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
    depends_on:
      - user-service
      - menu-service
      - order-service
      - payment-service

volumes:
  users-data:
  menu-data:
  orders-data:
  payments-data:
  kafka-data: